<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Vaisseau du joueur - Style pixel art rétro -->
  <!-- Corps principal -->
  <rect x="12" y="4" width="8" height="12" fill="#00FF00" stroke="#00AA00" stroke-width="1"/>
  
  <!-- Cockpit -->
  <rect x="14" y="6" width="4" height="4" fill="#FFFF00" stroke="#AAAA00" stroke-width="1"/>
  
  <!-- Ailes gauche -->
  <rect x="8" y="16" width="4" height="8" fill="#00DD00" stroke="#00AA00" stroke-width="1"/>
  
  <!-- Ailes droite -->
  <rect x="20" y="16" width="4" height="8" fill="#00DD00" stroke="#00AA00" stroke-width="1"/>
  
  <!-- Bas du vaisseau (moteur) -->
  <rect x="12" y="16" width="8" height="4" fill="#FF6600" stroke="#CC4400" stroke-width="1"/>
  
  <!-- Flamme du moteur -->
  <rect x="14" y="20" width="4" height="4" fill="#FFAA00" stroke="#FF6600" stroke-width="1"/>
</svg>