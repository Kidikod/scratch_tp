<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Effet d'explosion - Rétro pixel art -->
  
  <!-- Flash blanc au centre -->
  <rect x="12" y="12" width="8" height="8" fill="#FFFFFF" stroke="#FFFF00" stroke-width="1"/>
  
  <!-- Éclats de feu internes -->
  <rect x="8" y="14" width="4" height="4" fill="#FFFF00" stroke="#FF8800" stroke-width="1"/>
  <rect x="20" y="14" width="4" height="4" fill="#FFFF00" stroke="#FF8800" stroke-width="1"/>
  <rect x="14" y="8" width="4" height="4" fill="#FF6600" stroke="#FF3300" stroke-width="1"/>
  <rect x="14" y="20" width="4" height="4" fill="#FF6600" stroke="#FF3300" stroke-width="1"/>
  
  <!-- Fragments externes -->
  <rect x="6" y="10" width="3" height="3" fill="#FFAA00" stroke="#FF6600" stroke-width="1"/>
  <rect x="23" y="10" width="3" height="3" fill="#FFAA00" stroke="#FF6600" stroke-width="1"/>
  <rect x="6" y="19" width="3" height="3" fill="#FF6600" stroke="#FF3300" stroke-width="1"/>
  <rect x="23" y="19" width="3" height="3" fill="#FF6600" stroke="#FF3300" stroke-width="1"/>
  
  <!-- Petits débris de coins -->
  <rect x="4" y="6" width="2" height="2" fill="#FF3300" stroke="#AA0000" stroke-width="1"/>
  <rect x="26" y="6" width="2" height="2" fill="#FF3300" stroke="#AA0000" stroke-width="1"/>
  <rect x="4" y="24" width="2" height="2" fill="#FFAA00" stroke="#FF6600" stroke-width="1"/>
  <rect x="26" y="24" width="2" height="2" fill="#FFAA00" stroke="#FF6600" stroke-width="1"/>
</svg>