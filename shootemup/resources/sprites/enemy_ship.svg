<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Vaisseau ennemi - Style pixel art rétro (inverted) -->
  <!-- Corps principal -->
  <rect x="12" y="8" width="8" height="12" fill="#FF3333" stroke="#AA0000" stroke-width="1"/>
  
  <!-- Cockpit maléfique -->
  <rect x="14" y="10" width="4" height="4" fill="#FF0000" stroke="#660000" stroke-width="1"/>
  
  <!-- Ailes gauche -->
  <rect x="6" y="16" width="6" height="8" fill="#FF0000" stroke="#AA0000" stroke-width="1"/>
  
  <!-- Ailes droite -->
  <rect x="20" y="16" width="6" height="8" fill="#FF0000" stroke="#AA0000" stroke-width="1"/>
  
  <!-- Canon gauche -->
  <rect x="8" y="12" width="2" height="6" fill="#333333" stroke="#000000" stroke-width="1"/>
  
  <!-- Canon droit -->
  <rect x="22" y="12" width="2" height="6" fill="#333333" stroke="#000000" stroke-width="1"/>
  
  <!-- Détails technologiques -->
  <rect x="14" y="22" width="4" height="3" fill="#FFFF00" stroke="#AAAA00" stroke-width="1"/>
